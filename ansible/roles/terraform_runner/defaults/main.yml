---
terraform_working_dir: "{{ playbook_dir }}/../../blueprints/core"
terraform_environment_dir: ""
terraform_var_file: ""
terraform_require_var_file: false
terraform_plan_file: tfplan.tfplan
terraform_action: plan
terraform_backend_enabled: false
terraform_run_plan: true
terraform_block_production_changes: true
terraform_plugin_cache_dir: >-
  {{
    lookup('env', 'TF_PLUGIN_CACHE_DIR') |
    default(lookup('env', 'HOME') ~ '/.terraform.d/plugin-cache', true)
  }}
terraform_godebug: "{{ lookup('env', 'GODEBUG') | default('', true) }}"
terraform_allow_legacy_x509_cn: >-
  {{
    (
      lookup('env', 'TERRAFORM_ALLOW_LEGACY_X509_CN') |
      default(lookup('env', 'TF_ALLOW_LEGACY_X509_CN'), true) |
      default('false', true)
    ) | bool
  }}
terraform_godebug_effective: >-
  {{
    (
      terraform_allow_legacy_x509_cn and
      'x509ignoreCN=0' not in terraform_godebug
    ) | ternary(
      ((terraform_godebug | length > 0) |
        ternary(terraform_godebug ~ ',x509ignoreCN=0', 'x509ignoreCN=0')),
      terraform_godebug
    )
  }}
terraform_command_environment:
  CHECKPOINT_DISABLE: "1"
  TF_IN_AUTOMATION: "true"
  TF_PLUGIN_CACHE_DIR: "{{ terraform_plugin_cache_dir }}"
  GODEBUG: "{{ terraform_godebug_effective }}"
