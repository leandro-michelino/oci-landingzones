# Maintainer: Leandro Michelino | ACE | leandro.michelino@oracle.com
---
terraform_working_dir: "{{ playbook_dir }}/../../blueprints/core"
terraform_environment_dir: ""
terraform_var_file: ""
terraform_require_var_file: false
terraform_plan_file: tfplan
terraform_action: plan
terraform_backend_enabled: false
terraform_run_plan: true
terraform_block_production_changes: true
terraform_plugin_cache_dir: >-
  {{
    lookup('env', 'TF_PLUGIN_CACHE_DIR') |
    default(lookup('env', 'HOME') ~ '/.terraform.d/plugin-cache', true)
  }}
