  - blueprints/networking/hub-spoke-with-hub-vcn-fastconnect-vc
  - blueprints/networking/hub-spoke-with-hub-vcn-net-firewall
  - blueprints/networking/hub-spoke-with-hub-vcn-net-appliance
  - blueprints/networking/hub-spoke-with-hub-vcn-bastion-jump-host
