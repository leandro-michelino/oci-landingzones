# Maintainer: Leandro Michelino | ACE | leandro.michelino@oracle.com
---
- name: Check optional validation tools
  ansible.builtin.command: "which {{ item }}"
  changed_when: false
  failed_when: false
  register: validation_optional_tool_checks
  loop: "{{ validation_optional_tools }}"

- name: Track optional validation tool availability
  ansible.builtin.set_fact:
    validation_available_tools: >-
      {{
        validation_available_tools | default({}) |
        combine({item.item: item.rc == 0})
      }}
  loop: "{{ validation_optional_tool_checks.results }}"

- name: Run repository validation
  block:
    - name: Run terraform format check
      ansible.builtin.command: terraform fmt -check -recursive
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false

    - name: Find Terraform blueprint entry points
      ansible.builtin.find:
        paths: "{{ validation_blueprint_roots }}"
        patterns: main.tf
        file_type: file
        recurse: true
      register: validation_blueprint_entry_points

    - name: Check blueprint README files
      ansible.builtin.stat:
        path: "{{ item.path | dirname }}/README.md"
      register: validation_blueprint_readmes
      loop: "{{ validation_blueprint_entry_points.files | default([]) }}"
      loop_control:
        label: "{{ item.path | dirname | regex_replace('^' ~ validation_repo_root ~ '/', '') }}/README.md"

    - name: Fail when a blueprint README is missing
      ansible.builtin.fail:
        msg: "{{ item.item.path | dirname }}/README.md is required for every Terraform blueprint."
      when: not item.stat.exists
      loop: "{{ validation_blueprint_readmes.results | default([]) }}"
      loop_control:
        label: "{{ item.item.path | dirname | regex_replace('^' ~ validation_repo_root ~ '/', '') }}/README.md"

    - name: Read blueprint README files
      ansible.builtin.slurp:
        src: "{{ item.item.path | dirname }}/README.md"
      register: validation_blueprint_readme_contents
      loop: "{{ validation_blueprint_readmes.results | default([]) }}"
      when: item.stat.exists
      loop_control:
        label: "{{ item.item.path | dirname | regex_replace('^' ~ validation_repo_root ~ '/', '') }}/README.md"

    - name: Fail when a blueprint README lacks full deployment guidance
      ansible.builtin.fail:
        msg: "{{ item.source }} must include at-a-glance guidance, full deployment purpose, inputs, outputs, Terraform and Ansible workflow, local ASCII architecture, review, and validation sections."
      when:
        - >-
          '## Deployment Purpose' not in (item.content | b64decode) or
          '## At A Glance' not in (item.content | b64decode) or
          '## When To Use This Deployment' not in (item.content | b64decode) or
          '## What This Deploys' not in (item.content | b64decode) or
          '## Folder Contract' not in (item.content | b64decode) or
          '## Inputs To Decide' not in (item.content | b64decode) or
          '## Outputs And Hand-Off' not in (item.content | b64decode) or
          '## Terraform And Ansible Workflow' not in (item.content | b64decode) or
          '## Architecture' not in (item.content | b64decode) or
          'architecture/README.md' not in (item.content | b64decode) or
          '## Review Before Apply' not in (item.content | b64decode) or
          '## Validation' not in (item.content | b64decode)
      loop: "{{ validation_blueprint_readme_contents.results | default([]) }}"
      loop_control:
        label: "{{ item.source }}"

    - name: Check blueprint architecture README files
      ansible.builtin.stat:
        path: "{{ item.path | dirname }}/architecture/README.md"
      register: validation_blueprint_architecture_readmes
      loop: "{{ validation_blueprint_entry_points.files | default([]) }}"
      loop_control:
        label: "{{ item.path | dirname | regex_replace('^' ~ validation_repo_root ~ '/', '') }}/architecture/README.md"

    - name: Fail when a blueprint architecture README is missing
      ansible.builtin.fail:
        msg: "{{ item.item.path | dirname }}/architecture/README.md is required for every Terraform blueprint."
      when: not item.stat.exists
      loop: "{{ validation_blueprint_architecture_readmes.results | default([]) }}"
      loop_control:
        label: "{{ item.item.path | dirname | regex_replace('^' ~ validation_repo_root ~ '/', '') }}/architecture/README.md"

    - name: Read blueprint architecture README files
      ansible.builtin.slurp:
        src: "{{ item.item.path | dirname }}/architecture/README.md"
      register: validation_blueprint_architecture_contents
      loop: "{{ validation_blueprint_architecture_readmes.results | default([]) }}"
      when: item.stat.exists
      loop_control:
        label: "{{ item.item.path | dirname | regex_replace('^' ~ validation_repo_root ~ '/', '') }}/architecture/README.md"

    - name: Fail when a blueprint architecture README lacks detailed ASCII sections
      ansible.builtin.fail:
        msg: "{{ item.source }} must include architecture at-a-glance guidance, detailed ASCII architecture, Terraform components, deployment flow, review checklist, and Terraform + Ansible deployment output sections."
      when:
        - >-
          '## ASCII Architecture' not in (item.content | b64decode) or
          '## Architecture At A Glance' not in (item.content | b64decode) or
          '## Terraform Components' not in (item.content | b64decode) or
          '## Request And Deployment Flow' not in (item.content | b64decode) or
          '## Review Checklist' not in (item.content | b64decode) or
          '## Terraform + Ansible Deployment Output' not in (item.content | b64decode) or
          'terraform output' not in (item.content | b64decode) or
          'ansible-playbook -i localhost, ansible/plan.yml' not in (item.content | b64decode) or
          'CONFIRM_APPLY=true ansible-playbook -i localhost, ansible/apply.yml' not in (item.content | b64decode)
      loop: "{{ validation_blueprint_architecture_contents.results | default([]) }}"
      loop_control:
        label: "{{ item.source }}"

    - name: Read Terraform blueprint entry points
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      register: validation_blueprint_entry_contents
      loop: "{{ validation_blueprint_entry_points.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Reset implemented Terraform blueprint list
      ansible.builtin.set_fact:
        validation_terraform_directories: []

    - name: Fail when a Terraform blueprint still has scaffold markers
      ansible.builtin.fail:
        msg: "{{ item.source }} still contains scaffold markers. Replace them with real Terraform wiring before validation."
      when:
        - "'Terraform scaffold' in (item.content | b64decode) or 'Compose reusable modules here' in (item.content | b64decode)"
      loop: "{{ validation_blueprint_entry_contents.results | default([]) }}"
      loop_control:
        label: "{{ item.source }}"

    - name: Build implemented Terraform blueprint list
      ansible.builtin.set_fact:
        validation_terraform_directories: >-
          {{
            validation_terraform_directories +
            [item.source | dirname]
          }}
      loop: "{{ validation_blueprint_entry_contents.results | default([]) }}"
      loop_control:
        label: "{{ item.source }}"

    - name: Show Terraform blueprint count
      ansible.builtin.debug:
        msg: "Validating {{ validation_terraform_directories | length }} Terraform blueprints."

    - name: Prepare Terraform plugin cache
      ansible.builtin.file:
        path: "{{ validation_terraform_plugin_cache_dir }}"
        state: directory
        mode: "0755"
      when: validation_terraform_directories | length > 0

    - name: Run terraform init without backend for implemented blueprints
      ansible.builtin.command: terraform init -backend=false -input=false -no-color
      args:
        chdir: "{{ item }}"
      changed_when: false
      environment:
        CHECKPOINT_DISABLE: "1"
        TF_IN_AUTOMATION: "true"
        TF_PLUGIN_CACHE_DIR: "{{ validation_terraform_plugin_cache_dir }}"
      async: "{{ validation_terraform_command_timeout_seconds }}"
      poll: "{{ validation_terraform_command_poll_seconds }}"
      loop: "{{ validation_terraform_directories | sort }}"
      loop_control:
        label: "{{ item | regex_replace('^' ~ validation_repo_root ~ '/', '') }}"

    - name: Run terraform validate for implemented blueprints
      ansible.builtin.command: terraform validate -no-color
      args:
        chdir: "{{ item }}"
      changed_when: false
      environment:
        CHECKPOINT_DISABLE: "1"
        TF_IN_AUTOMATION: "true"
        TF_PLUGIN_CACHE_DIR: "{{ validation_terraform_plugin_cache_dir }}"
      async: "{{ validation_terraform_command_timeout_seconds }}"
      poll: "{{ validation_terraform_command_poll_seconds }}"
      loop: "{{ validation_terraform_directories | sort }}"
      loop_control:
        label: "{{ item | regex_replace('^' ~ validation_repo_root ~ '/', '') }}"

    - name: Run tflint when available
      ansible.builtin.command: tflint --recursive
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false
      when: validation_available_tools["tflint"] | default(false)

    - name: Run tfsec when available
      ansible.builtin.command: tfsec .
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false
      when: validation_available_tools["tfsec"] | default(false)

    - name: Run checkov when available
      ansible.builtin.command: checkov -d . --framework terraform --compact
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false
      when: validation_available_tools["checkov"] | default(false)

    - name: Run ansible-lint when available
      ansible.builtin.command: ansible-lint ansible
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false
      when: validation_available_tools["ansible-lint"] | default(false)

    - name: Run Ansible playbook syntax checks
      ansible.builtin.command: "ansible-playbook --syntax-check {{ item }}"
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false
      loop: "{{ validation_playbooks }}"

    - name: Find blueprint-local Ansible playbooks
      ansible.builtin.command:
        argv:
          - find
          - "{{ item }}"
          - -path
          - "*/.terraform/*"
          - -prune
          - -o
          - (
          - -path
          - "*/ansible/plan.yml"
          - -o
          - -path
          - "*/ansible/apply.yml"
          - -o
          - -path
          - "*/ansible/destroy.yml"
          - )
          - -type
          - f
          - -print
      changed_when: false
      register: validation_blueprint_ansible_find_results
      loop: "{{ validation_blueprint_roots }}"

    - name: Build blueprint-local Ansible playbook list
      ansible.builtin.set_fact:
        validation_blueprint_ansible_playbook_paths: >-
          {{
            validation_blueprint_ansible_find_results.results |
            default([]) |
            map(attribute='stdout_lines') |
            list |
            flatten |
            sort |
            list
          }}

    - name: Show blueprint-local Ansible playbook count
      ansible.builtin.debug:
        msg: "Validating {{ validation_blueprint_ansible_playbook_paths | length }} blueprint-local Ansible playbooks."

    - name: Run blueprint-local Ansible syntax checks
      ansible.builtin.command: "ansible-playbook --syntax-check {{ item }}"
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false
      loop: "{{ validation_blueprint_ansible_playbook_paths }}"
      loop_control:
        label: "{{ item | regex_replace('^' ~ validation_repo_root ~ '/', '') }}"

    - name: Run pre-commit when available
      ansible.builtin.command: pre-commit run --all-files
      args:
        chdir: "{{ validation_repo_root }}"
      changed_when: false
      when: validation_available_tools["pre-commit"] | default(false)

  always:
    - name: Find generated Terraform directories
      ansible.builtin.find:
        paths: "{{ validation_repo_root }}"
        patterns: "{{ validation_cleanup_patterns }}"
        file_type: directory
        recurse: true
        hidden: true
      register: validation_generated_dirs

    - name: Remove generated Terraform directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ validation_generated_dirs.files }}"
      loop_control:
        label: "{{ item.path | regex_replace('^' ~ validation_repo_root ~ '/', '') }}"

    - name: Find generated Terraform files
      ansible.builtin.find:
        paths: "{{ validation_repo_root }}"
        patterns:
          - .terraform.lock.hcl
          - terraform.tfstate
          - terraform.tfstate.backup
          - "*.tfplan"
        file_type: file
        recurse: true
        hidden: true
      register: validation_generated_files

    - name: Remove generated Terraform files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ validation_generated_files.files }}"
      loop_control:
        label: "{{ item.path | regex_replace('^' ~ validation_repo_root ~ '/', '') }}"
