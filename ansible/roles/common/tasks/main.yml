# Maintainer: Leandro Michelino | ACE | leandro.michelino@oracle.com
---
- name: Check required command availability
  ansible.builtin.command: "which {{ item }}"
  changed_when: false
  failed_when: false
  register: command_checks
  loop: "{{ landingzone_required_commands }}"

- name: Show missing commands
  ansible.builtin.debug:
    msg: "Missing command: {{ item.item }}"
  when: item.rc != 0
  loop: "{{ command_checks.results }}"

- name: Require local commands
  ansible.builtin.assert:
    that:
      - command_checks.results | selectattr('rc', 'ne', 0) | list | length == 0
    fail_msg: "Install the missing local commands reported above before continuing."
