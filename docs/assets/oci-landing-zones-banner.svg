<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="t d">
  <title id="t">OCI Landing Zones</title>
  <desc id="d">Banner for OCI Landing Zones: Terraform blueprints, Ansible orchestration, and architecture notes for repeatable OCI cloud foundations.</desc>

  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c74634"/>
      <stop offset="50%"  stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#4f6bed"/>
    </linearGradient>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c74634"/>
      <stop offset="50%"  stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#4f6bed"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#94a3b8" opacity="0.14"/>
    </pattern>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <clipPath id="cc">
      <rect width="720" height="432" rx="16"/>
    </clipPath>
    <clipPath id="cb">
      <rect width="664" height="86" rx="10"/>
    </clipPath>
    <clipPath id="pc">
      <rect width="200" height="76" rx="10"/>
    </clipPath>
  </defs>

  <!-- White background with dot texture -->
  <rect width="1280" height="520" fill="#ffffff"/>
  <rect width="1280" height="520" fill="url(#dots)"/>

  <!-- Left vertical accent bar -->
  <rect x="0" y="0" width="6" height="520" fill="url(#vg)"/>

  <!-- LEFT PANEL -->
  <g transform="translate(40,40)">

    <!-- Title -->
    <text y="56" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="800" fill="#0f172a">OCI Landing Zones</text>
    <rect y="66" width="375" height="3" rx="1.5" fill="url(#hg)"/>

    <!-- Tagline -->
    <text y="98" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#c74634">Blueprints &#183; Automation &#183; Architecture &#183; CIS</text>

    <!-- Description -->
    <text y="124" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#475569">Pick a blueprint, review the ASCII architecture, run a plan.</text>
    <text y="146" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#475569">Modules and automation for OCI patterns that come up again.</text>

    <!-- Stats line -->
    <text y="163" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8">40+ blueprints &#183; 12 families &#183; AI &#183; DevOps &#183; phases 5&#8211;8 on the roadmap</text>

    <!-- Author -->
    <text y="178" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8">Leandro Michelino &#183; ACE &#183; Oracle</text>

    <!-- Tech-stack badges -->
    <rect y="194" width="118" height="32" rx="16" fill="#c74634"/>
    <text x="59"  y="215" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Terraform</text>

    <rect x="126" y="194" width="100" height="32" rx="16" fill="#0891b2"/>
    <text x="176" y="215" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Ansible</text>

    <rect x="234" y="194" width="78"  height="32" rx="16" fill="#4f6bed"/>
    <text x="273" y="215" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">OCI</text>

    <rect x="320" y="194" width="70"  height="32" rx="16" fill="#d97706"/>
    <text x="355" y="215" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">CIS</text>

    <!-- Divider -->
    <line x1="0" y1="242" x2="425" y2="242" stroke="#e2e8f0" stroke-width="1"/>

    <!-- WORKFLOW section -->
    <rect y="252" width="3" height="11" rx="1.5" fill="#0891b2"/>
    <text x="9" y="262" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155" font-weight="700" letter-spacing="1">WORKFLOW</text>

    <rect y="271" width="96"  height="28" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <text x="48"  y="290" font-family="Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#0e7490" text-anchor="middle">validate</text>

    <line x1="100" y1="285" x2="108" y2="285" stroke="#94a3b8" stroke-width="1.5"/>
    <polygon points="105,281 113,285 105,289" fill="#94a3b8"/>

    <rect x="116" y="271" width="72"  height="28" rx="6" fill="#eff6ff" stroke="#4f6bed" stroke-width="1.5"/>
    <text x="152" y="290" font-family="Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#3730a3" text-anchor="middle">plan</text>

    <line x1="192" y1="285" x2="200" y2="285" stroke="#94a3b8" stroke-width="1.5"/>
    <polygon points="197,281 205,285 197,289" fill="#94a3b8"/>

    <rect x="208" y="271" width="72"  height="28" rx="6" fill="#fee2e2" stroke="#c74634" stroke-width="1.5"/>
    <text x="244" y="290" font-family="Menlo, Consolas, monospace" font-size="13" font-weight="600" fill="#9b1c1c" text-anchor="middle">apply</text>

    <!-- Divider -->
    <line x1="0" y1="316" x2="425" y2="316" stroke="#e2e8f0" stroke-width="1"/>

    <!-- BLUEPRINT FAMILIES section -->
    <rect y="326" width="3" height="11" rx="1.5" fill="#c74634"/>
    <text x="9" y="336" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155" font-weight="700" letter-spacing="1">BLUEPRINT FAMILIES</text>

    <!-- Row 1: foundation, networking, entity, extensions -->
    <rect y="344" width="52"  height="20" rx="10" fill="#fff7ed" stroke="#fed7aa"  stroke-width="1"/>
    <text x="26"  y="358" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9a3412" text-anchor="middle">core</text>

    <rect x="58"  y="344" width="44"  height="20" rx="10" fill="#fffbeb" stroke="#fde68a"  stroke-width="1"/>
    <text x="80"  y="358" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#78350f" text-anchor="middle">CIS</text>

    <rect x="108" y="344" width="84"  height="20" rx="10" fill="#ecfeff" stroke="#a5f3fc"  stroke-width="1"/>
    <text x="150" y="358" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#155e75" text-anchor="middle">networking</text>

    <rect x="198" y="344" width="108" height="20" rx="10" fill="#eff6ff" stroke="#bfdbfe"  stroke-width="1"/>
    <text x="252" y="358" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1e3a8a" text-anchor="middle">operating-entity</text>

    <rect x="312" y="344" width="78"  height="20" rx="10" fill="#f5f3ff" stroke="#ddd6fe"  stroke-width="1"/>
    <text x="351" y="358" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4c1d95" text-anchor="middle">extensions</text>

    <!-- Row 2: identity, compliance, data, DR, industry -->
    <rect y="370" width="62"  height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1"  stroke-width="1"/>
    <text x="31"  y="384" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#334155" text-anchor="middle">identity</text>

    <rect x="68"  y="370" width="84"  height="20" rx="10" fill="#fee2e2" stroke="#fca5a5"  stroke-width="1"/>
    <text x="110" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#991b1b" text-anchor="middle">compliance</text>

    <rect x="158" y="370" width="100" height="20" rx="10" fill="#f0fdf4" stroke="#bbf7d0"  stroke-width="1"/>
    <text x="208" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#14532d" text-anchor="middle">data-platform</text>

    <rect x="264" y="370" width="46"  height="20" rx="10" fill="#eef2ff" stroke="#c7d2fe"  stroke-width="1"/>
    <text x="287" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#312e81" text-anchor="middle">DR</text>

    <rect x="316" y="370" width="70"  height="20" rx="10" fill="#fff1f2" stroke="#fecdd3"  stroke-width="1"/>
    <text x="351" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#881337" text-anchor="middle">industry</text>

    <!-- Row 3: new families -->
    <rect y="396" width="36"  height="20" rx="10" fill="#fee2e2" stroke="#fca5a5"  stroke-width="1"/>
    <text x="18"  y="410" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#991b1b" text-anchor="middle">ai</text>

    <rect x="42"  y="396" width="62"  height="20" rx="10" fill="#ecfeff" stroke="#a5f3fc"  stroke-width="1"/>
    <text x="73"  y="410" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#155e75" text-anchor="middle">devops</text>

  </g>

  <!-- RIGHT PANEL: Architecture Card -->
  <g transform="translate(524,30)" filter="url(#sh)">

    <!-- Card background with gradient top bar -->
    <g clip-path="url(#cc)">
      <rect width="720" height="432" fill="#ffffff"/>
      <rect width="720" height="5"   fill="url(#hg)"/>
    </g>
    <rect width="720" height="432" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

    <!-- Card header -->
    <text x="28" y="29" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0f172a">Architecture Stack</text>
    <text x="28" y="46" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8">OCI Tenancy &#183; Any Region &#183; Single or Multi-region</text>
    <line x1="28" y1="55" x2="692" y2="55" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Layer 0: Blueprint entry -->
    <g transform="translate(260,67)">
      <rect width="200" height="44" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
      <rect width="5"   height="44" rx="2"  fill="#c74634"/>
      <text x="100" y="20" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#991b1b" text-anchor="middle">Blueprint</text>
      <text x="100" y="35" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#b91c1c" text-anchor="middle">compartment &#183; region &#183; env</text>
    </g>
    <!-- Arrow: Blueprint to Core -->
    <line x1="360" y1="111" x2="360" y2="129" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="354,127 360,137 366,127" fill="#cbd5e1"/>

    <!-- Layer 1: Core Baseline -->
    <g transform="translate(28,139)">
      <g clip-path="url(#cb)">
        <rect width="664" height="86" fill="#fff7ed"/>
        <rect width="664" height="28" fill="#fde8cc"/>
        <rect width="5"   height="86" fill="#ea580c"/>
      </g>
      <rect width="664" height="86" rx="10" fill="none" stroke="#fed7aa" stroke-width="1.5"/>
      <line x1="5" y1="28" x2="659" y2="28" stroke="#fed7aa" stroke-width="1"/>
      <text x="20" y="19" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#9a3412" font-weight="700">Core Baseline</text>
      <rect x="530" y="6"  width="120" height="16" rx="8" fill="#ea580c" fill-opacity="0.14"/>
      <text x="590" y="18" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="700">FOUNDATION LAYER</text>
      <rect x="12"  y="36" width="52"  height="16" rx="8" fill="#ea580c" fill-opacity="0.14"/>
      <text x="38"  y="48" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="700">GOVERN</text>
      <text x="72"  y="48" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7c3d2a">compartments &#183; IAM &#183; tagging &#183; logging &#183; monitoring &#183; budgets</text>
      <rect x="12"  y="58" width="52"  height="16" rx="8" fill="#ea580c" fill-opacity="0.14"/>
      <text x="38"  y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9a3412" text-anchor="middle" font-weight="700">PROTECT</text>
      <text x="72"  y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7c3d2a">Cloud Guard &#183; Vault / KMS &#183; Security Zones &#183; VSS &#183; Events</text>
    </g>

    <!-- Arrows: Core to three pillars -->
    <line x1="128" y1="225" x2="128" y2="243" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="122,241 128,251 134,241" fill="#cbd5e1"/>
    <line x1="360" y1="225" x2="360" y2="243" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="354,241 360,251 366,241" fill="#cbd5e1"/>
    <line x1="592" y1="225" x2="592" y2="243" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="586,241 592,251 598,241" fill="#cbd5e1"/>

    <!-- Layer 2: Three pillars with header bands -->

    <!-- Networking (teal) -->
    <g transform="translate(28,255)">
      <g clip-path="url(#pc)">
        <rect width="200" height="76" fill="#ecfeff"/>
        <rect width="200" height="22" fill="#a5f3fc" fill-opacity="0.55"/>
        <rect width="5"   height="76" fill="#0891b2"/>
      </g>
      <rect width="200" height="76" rx="10" fill="none" stroke="#a5f3fc" stroke-width="1.5"/>
      <line x1="5" y1="22" x2="195" y2="22" stroke="#a5f3fc" stroke-width="0.8" opacity="0.8"/>
      <text x="103" y="16" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#155e75" text-anchor="middle">Networking</text>
      <text x="103" y="39" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#164e63" text-anchor="middle">VCN &#183; DRG &#183; Hub-Spoke</text>
      <text x="103" y="54" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#164e63" text-anchor="middle">NVA &#183; FastConnect &#183; DNS</text>
    </g>

    <!-- Operating Entity (blue) -->
    <g transform="translate(260,255)">
      <g clip-path="url(#pc)">
        <rect width="200" height="76" fill="#eff6ff"/>
        <rect width="200" height="22" fill="#bfdbfe" fill-opacity="0.55"/>
        <rect width="5"   height="76" fill="#4f6bed"/>
      </g>
      <rect width="200" height="76" rx="10" fill="none" stroke="#bfdbfe" stroke-width="1.5"/>
      <line x1="5" y1="22" x2="195" y2="22" stroke="#bfdbfe" stroke-width="0.8" opacity="0.8"/>
      <text x="103" y="16" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1e3a8a" text-anchor="middle">Operating Entity</text>
      <text x="103" y="39" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle">workload vending</text>
      <text x="103" y="54" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle">BU &#183; app-team scope</text>
    </g>

    <!-- Security / CIS (amber) -->
    <g transform="translate(492,255)">
      <g clip-path="url(#pc)">
        <rect width="200" height="76" fill="#fefce8"/>
        <rect width="200" height="22" fill="#fde68a" fill-opacity="0.55"/>
        <rect width="5"   height="76" fill="#d97706"/>
      </g>
      <rect width="200" height="76" rx="10" fill="none" stroke="#fde68a" stroke-width="1.5"/>
      <line x1="5" y1="22" x2="195" y2="22" stroke="#fde68a" stroke-width="0.8" opacity="0.8"/>
      <text x="103" y="16" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#78350f" text-anchor="middle">Security / CIS</text>
      <text x="103" y="39" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#92400e" text-anchor="middle">guardrails &#183; scanning</text>
      <text x="103" y="54" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#92400e" text-anchor="middle">CIS L1 / L2 &#183; compliance</text>
    </g>

    <!-- Arrow: Pillars to Extensions -->
    <line x1="360" y1="331" x2="360" y2="349" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="354,347 360,357 366,347" fill="#cbd5e1"/>

    <!-- Layer 3: Extensions -->
    <g transform="translate(28,361)">
      <rect width="664" height="52" rx="10" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="5"   height="52" rx="2"  fill="#7c3aed"/>
      <text x="334" y="17" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6d28d9" text-anchor="middle" font-weight="700">Extensions</text>
      <text x="334" y="33" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4c1d95" text-anchor="middle">OKE &#183; WAF &#183; Exadata &#183; API Gateway &#183; Streaming &#183; Full Stack DR</text>
      <text x="334" y="47" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4c1d95" text-anchor="middle">GenAI &#183; DevOps &#183; OIC &#183; OAC &#183; Observability &#183; Service Mesh</text>
    </g>

  </g>

  <!-- Bottom rule and accent stripe -->
  <line x1="0" y1="513" x2="1280" y2="513" stroke="#e2e8f0" stroke-width="1"/>
  <rect  y="513" width="1280" height="7" fill="url(#hg)"/>

</svg>
