<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">OCI Core Landing Zone Architecture</title>
  <desc id="desc">Core landing zone drawing showing tenancy, compartments, IAM, governance, security, operations, and downstream blueprint consumers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#384152"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#C74634"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: #f7f8fa; }
      .title { font: 700 38px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #5b6472; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #64748b; }
      .section-title { font: 700 15px Arial, Helvetica, sans-serif; letter-spacing: 1.2px; fill: #6b7280; }
      .box { fill: #ffffff; stroke: #d8dee8; stroke-width: 1.4; rx: 14; filter: url(#soft-shadow); }
      .subbox { fill: #ffffff; stroke: #d8dee8; stroke-width: 1.2; rx: 10; }
      .tenancy { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 22; filter: url(#soft-shadow); }
      .root { fill: #fff4f1; stroke: #d66650; stroke-width: 2; rx: 18; }
      .network { fill: #eef7ff; stroke: #3b82c4; stroke-width: 1.8; rx: 14; }
      .security { fill: #f0fbf5; stroke: #2f8f5b; stroke-width: 1.8; rx: 14; }
      .governance { fill: #fff8e8; stroke: #d1911b; stroke-width: 1.8; rx: 14; }
      .workloads { fill: #f6f2ff; stroke: #8364c7; stroke-width: 1.8; rx: 14; }
      .iam { fill: #f3f7fb; stroke: #8998aa; stroke-width: 1.4; rx: 12; }
      .chip { fill: #f8fafc; stroke: #d8dee8; stroke-width: 1; rx: 16; }
      .line { fill: none; stroke: #384152; stroke-width: 2; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #8190a3; stroke-width: 1.6; marker-end: url(#arrow); stroke-dasharray: 7 7; }
      .line-red { fill: none; stroke: #C74634; stroke-width: 2.2; marker-end: url(#arrow-red); }
      .muted-line { fill: none; stroke: #b6c2d1; stroke-width: 1.3; }
      .badge { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="1000"/>

  <text class="title" x="80" y="82">OCI Core Landing Zone</text>
  <text class="subtitle" x="80" y="116">Baseline blueprint: compartments, IAM, governance, security, operations, and reusable outputs for downstream deployments.</text>
  <text class="tiny" x="80" y="146">Source: blueprints/core/README.md and blueprints/core/main.tf</text>

  <rect class="chip" x="1190" y="58" width="320" height="44"/>
  <circle cx="1216" cy="80" r="8" fill="#C74634"/>
  <text class="small" x="1232" y="85">Terraform modules composed by core</text>

  <rect class="box" x="80" y="190" width="310" height="605"/>
  <text class="section-title" x="110" y="226">INPUTS AND EXECUTION</text>
  <rect class="subbox" x="110" y="252" width="250" height="92"/>
  <text class="label" x="132" y="286">Local operator</text>
  <text class="small" x="132" y="312">OCI CLI profile</text>
  <text class="small" x="132" y="334">Terraform variables</text>
  <rect class="subbox" x="110" y="372" width="250" height="124"/>
  <text class="label" x="132" y="406">Required context</text>
  <text class="small" x="132" y="432">tenancy_ocid</text>
  <text class="small" x="132" y="454">current_user_ocid</text>
  <text class="small" x="132" y="476">region / home_region</text>
  <rect class="subbox" x="110" y="524" width="250" height="128"/>
  <text class="label" x="132" y="558">Naming context</text>
  <text class="small" x="132" y="584">org</text>
  <text class="small" x="132" y="606">environment</text>
  <text class="small" x="132" y="628">region_key</text>
  <rect class="subbox" x="110" y="680" width="250" height="82"/>
  <text class="label" x="132" y="714">Optional profile</text>
  <text class="small" x="132" y="740">cis_level = level1 | level2</text>

  <rect class="tenancy" x="450" y="190" width="710" height="605"/>
  <text class="section-title" x="490" y="226">OCI TENANCY</text>

  <rect class="root" x="490" y="250" width="630" height="92"/>
  <text class="label" x="520" y="286">Landing zone root compartment</text>
  <text class="small" x="520" y="314">Parent for network, security, governance, and workloads</text>

  <rect class="network" x="490" y="384" width="290" height="135"/>
  <text class="label" x="520" y="420">Network compartment</text>
  <text class="small" x="520" y="448">Hub/spoke blueprints</text>
  <text class="small" x="520" y="472">VCNs, DRG, VPN, FastConnect</text>
  <text class="small" x="520" y="496">Firewall and DNS patterns</text>

  <rect class="security" x="830" y="384" width="290" height="135"/>
  <text class="label" x="860" y="420">Security compartment</text>
  <text class="small" x="860" y="448">Cloud Guard target</text>
  <text class="small" x="860" y="472">Vault / KMS</text>
  <text class="small" x="860" y="496">Security Zones and VSS</text>

  <rect class="governance" x="490" y="565" width="290" height="135"/>
  <text class="label" x="520" y="601">Governance compartment</text>
  <text class="small" x="520" y="629">Tags and tag defaults</text>
  <text class="small" x="520" y="653">Log groups and saved searches</text>
  <text class="small" x="520" y="677">Budgets, Events, Monitoring</text>

  <rect class="workloads" x="830" y="565" width="290" height="135"/>
  <text class="label" x="860" y="601">Workloads compartment</text>
  <text class="small" x="860" y="629">Application landing area</text>
  <text class="small" x="860" y="653">Operating entities</text>
  <text class="small" x="860" y="677">Extensions and service add-ons</text>

  <path class="muted-line" d="M805 342 L805 724"/>
  <path class="muted-line" d="M490 542 L1120 542"/>

  <rect class="iam" x="520" y="730" width="570" height="42"/>
  <text class="small" x="548" y="756">Home-region IAM: administrator, network, security, governance, workload, and auditor groups with scoped policies</text>

  <rect class="box" x="1220" y="190" width="300" height="605"/>
  <text class="section-title" x="1250" y="226">CONTROL MODULES</text>

  <rect class="subbox" x="1250" y="252" width="240" height="72"/>
  <circle cx="1272" cy="282" r="10" fill="#C74634"/>
  <text class="label" x="1294" y="288">IAM foundation</text>
  <text class="small" x="1294" y="310">groups, dynamic groups, policies</text>

  <rect class="subbox" x="1250" y="350" width="240" height="96"/>
  <circle cx="1272" cy="382" r="10" fill="#d1911b"/>
  <text class="label" x="1294" y="388">Governance</text>
  <text class="small" x="1294" y="412">tagging, logging</text>
  <text class="small" x="1294" y="434">budgets, events</text>

  <rect class="subbox" x="1250" y="472" width="240" height="118"/>
  <circle cx="1272" cy="504" r="10" fill="#2f8f5b"/>
  <text class="label" x="1294" y="510">Security</text>
  <text class="small" x="1294" y="534">Cloud Guard</text>
  <text class="small" x="1294" y="556">Vault, Security Zones</text>
  <text class="small" x="1294" y="578">VSS scanning</text>

  <rect class="subbox" x="1250" y="616" width="240" height="72"/>
  <circle cx="1272" cy="646" r="10" fill="#3b82c4"/>
  <text class="label" x="1294" y="652">Operations</text>
  <text class="small" x="1294" y="674">Monitoring topics and alarms</text>

  <rect class="subbox" x="1250" y="714" width="240" height="48"/>
  <text class="small" x="1272" y="743">All modules apply common tags</text>

  <path class="line-red" d="M360 300 C410 300 420 296 490 296"/>
  <text class="tiny" x="376" y="282">terraform apply</text>

  <path class="line" d="M1120 296 C1162 296 1186 286 1250 286"/>
  <path class="line" d="M780 632 C948 632 1100 398 1250 398"/>
  <path class="line" d="M1120 452 C1160 452 1192 532 1250 532"/>
  <path class="line" d="M780 632 C980 632 1112 652 1250 652"/>

  <path class="line-soft" d="M635 519 C635 546 635 548 635 565"/>
  <path class="line-soft" d="M975 519 C975 546 975 548 975 565"/>
  <path class="line-soft" d="M635 700 C675 740 770 750 830 700"/>
  <text class="tiny" x="666" y="744">shared outputs and scoped policies</text>

  <rect class="box" x="80" y="835" width="1440" height="105"/>
  <text class="section-title" x="110" y="872">DOWNSTREAM CONSUMERS</text>
  <rect class="chip" x="110" y="892" width="195" height="34"/>
  <text class="small" x="132" y="914">Networking blueprints</text>
  <rect class="chip" x="330" y="892" width="210" height="34"/>
  <text class="small" x="352" y="914">Operating entities</text>
  <rect class="chip" x="565" y="892" width="160" height="34"/>
  <text class="small" x="587" y="914">CIS wrappers</text>
  <rect class="chip" x="750" y="892" width="165" height="34"/>
  <text class="small" x="772" y="914">Extensions</text>
  <rect class="chip" x="940" y="892" width="225" height="34"/>
  <text class="small" x="962" y="914">Compliance patterns</text>
  <rect class="chip" x="1190" y="892" width="235" height="34"/>
  <text class="small" x="1212" y="914">Data and industry patterns</text>

  <path class="line-soft" d="M975 700 C1060 826 1100 862 1190 892"/>
  <path class="line-soft" d="M635 700 C548 820 420 862 330 892"/>
  <path class="line-soft" d="M635 519 C500 760 270 840 205 892"/>

  <rect x="80" y="960" width="12" height="12" fill="#fff4f1" stroke="#d66650"/>
  <text class="tiny" x="102" y="971">Core compartment structure</text>
  <rect x="280" y="960" width="12" height="12" fill="#fff8e8" stroke="#d1911b"/>
  <text class="tiny" x="302" y="971">Governance controls</text>
  <rect x="470" y="960" width="12" height="12" fill="#f0fbf5" stroke="#2f8f5b"/>
  <text class="tiny" x="492" y="971">Security controls</text>
  <rect x="640" y="960" width="12" height="12" fill="#eef7ff" stroke="#3b82c4"/>
  <text class="tiny" x="662" y="971">Network foundation</text>
</svg>
