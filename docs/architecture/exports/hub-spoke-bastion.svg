<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">OCI Hub-Spoke With Bastion Jump Host Architecture</title>
  <desc id="desc">Hub-spoke networking architecture showing administrator source networks, OCI Bastion in the hub VCN, DRG routing, workload spokes, private administrative access paths, and audit logging.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#C74634"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#1f7a4d"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <style>
      .page { fill: #f6f7f9; }
      .title { font: 700 38px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #566173; }
      .section-title { font: 700 14px Arial, Helvetica, sans-serif; fill: #687386; letter-spacing: 1.2px; }
      .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #64748b; }
      .badge { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .outer { fill: #ffffff; stroke: #ccd5e1; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .compartment { fill: #fbfdff; stroke: #d4dce8; stroke-width: 1.7; rx: 18; }
      .hub { fill: #eef7ff; stroke: #3479b7; stroke-width: 2; rx: 18; }
      .spoke-a { fill: #f3fbf6; stroke: #278153; stroke-width: 2; rx: 18; }
      .spoke-b { fill: #fff8e8; stroke: #c98513; stroke-width: 2; rx: 18; }
      .service { fill: #ffffff; stroke: #c7d2df; stroke-width: 1.4; rx: 12; }
      .bastion { fill: #fff4f1; stroke: #C74634; stroke-width: 2; rx: 12; }
      .drg { fill: #f7f2ff; stroke: #7759b8; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .admin { fill: #ffffff; stroke: #c7d2df; stroke-width: 1.7; rx: 18; filter: url(#shadow); }
      .audit { fill: #f8fafc; stroke: #b8c3d2; stroke-width: 1.6; rx: 16; }
      .chip { fill: #ffffff; stroke: #d7dee9; stroke-width: 1; rx: 14; }
      .route { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow-dark); }
      .admin-route { fill: none; stroke: #C74634; stroke-width: 2.4; marker-end: url(#arrow-red); }
      .audit-route { fill: none; stroke: #1f7a4d; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#arrow-green); }
      .muted { fill: none; stroke: #b9c5d4; stroke-width: 1.4; }
      .lane-label { font: 700 12px Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1100"/>

  <text class="title" x="80" y="78">OCI Hub-Spoke With Bastion Jump Host</text>
  <text class="subtitle" x="80" y="112">Centralized private administration through a hub bastion, DRG routing, workload spokes, and auditable access boundaries.</text>

  <rect class="outer" x="360" y="160" width="1360" height="820"/>
  <text class="section-title" x="405" y="206">OCI REGION</text>
  <text class="small" x="405" y="232">Networking compartment with hub VCN, DRG, workload spokes, and operations telemetry.</text>

  <rect class="admin" x="80" y="410" width="230" height="150"/>
  <text class="section-title" x="110" y="450">ADMIN SOURCES</text>
  <text class="label" x="110" y="480">Approved CIDRs</text>
  <text class="small" x="110" y="506">Corporate VPN</text>
  <text class="small" x="110" y="530">Privileged operators</text>

  <rect class="compartment" x="420" y="275" width="520" height="555"/>
  <text class="section-title" x="455" y="315">HUB COMPARTMENT</text>
  <rect class="hub" x="455" y="340" width="450" height="455"/>
  <text class="label" x="485" y="378">Hub VCN</text>
  <text class="tiny" x="485" y="401">Shared routing and administration plane</text>

  <rect class="bastion" x="500" y="435" width="355" height="86"/>
  <text class="label" x="528" y="469">OCI Bastion endpoint</text>
  <text class="small" x="528" y="494">Client allow list and session TTL</text>

  <rect class="service" x="500" y="570" width="355" height="82"/>
  <text class="label" x="528" y="604">Shared subnet</text>
  <text class="small" x="528" y="629">Private endpoint target subnet</text>

  <rect class="service" x="500" y="700" width="355" height="62"/>
  <text class="label" x="528" y="736">Security rules and route tables</text>

  <rect class="drg" x="1015" y="470" width="170" height="150"/>
  <text class="section-title" x="1062" y="515">DRG</text>
  <text class="label" x="1060" y="548">Routing</text>
  <text class="small" x="1050" y="574">VCN attachments</text>

  <rect class="compartment" x="1260" y="250" width="370" height="280"/>
  <text class="section-title" x="1290" y="290">SPOKE A COMPARTMENT</text>
  <rect class="spoke-a" x="1290" y="320" width="310" height="178"/>
  <text class="label" x="1320" y="356">Spoke VCN A</text>
  <rect class="chip" x="1320" y="382" width="80" height="34"/>
  <text class="tiny" x="1344" y="404">Web</text>
  <rect class="chip" x="1410" y="382" width="80" height="34"/>
  <text class="tiny" x="1434" y="404">App</text>
  <rect class="chip" x="1500" y="382" width="70" height="34"/>
  <text class="tiny" x="1520" y="404">DB</text>
  <text class="small" x="1320" y="454">Admin targets stay private</text>

  <rect class="compartment" x="1260" y="635" width="370" height="280"/>
  <text class="section-title" x="1290" y="675">SPOKE B COMPARTMENT</text>
  <rect class="spoke-b" x="1290" y="705" width="310" height="178"/>
  <text class="label" x="1320" y="741">Spoke VCN B</text>
  <rect class="chip" x="1320" y="767" width="80" height="34"/>
  <text class="tiny" x="1344" y="789">Web</text>
  <rect class="chip" x="1410" y="767" width="80" height="34"/>
  <text class="tiny" x="1434" y="789">App</text>
  <rect class="chip" x="1500" y="767" width="70" height="34"/>
  <text class="tiny" x="1520" y="789">DB</text>
  <text class="small" x="1320" y="839">Admin targets stay private</text>

  <rect class="audit" x="455" y="865" width="1145" height="70"/>
  <text class="section-title" x="485" y="905">AUDIT AND LOGGING BOUNDARY</text>
  <text class="small" x="485" y="928">Bastion sessions, route changes, and security rule updates flow to logging, audit review, and operations hand-off.</text>

  <rect x="384" y="251" width="1260" height="1" fill="#e2e8f0"/>
  <text class="lane-label" x="390" y="266">top control lane</text>
  <rect x="384" y="835" width="1260" height="1" fill="#e2e8f0"/>
  <text class="lane-label" x="390" y="852">operations lane</text>

  <!-- Connector routes use open gutters between resource blocks to keep arrows out of the designs. -->
  <path class="admin-route" d="M 310 485 H 385 V 478 H 500"/>
  <text class="lane-label" x="337" y="466">session request</text>

  <path class="admin-route" d="M 678 521 V 570"/>
  <text class="lane-label" x="694" y="550">private endpoint</text>

  <path class="route" d="M 855 611 H 965 V 545 H 1015"/>
  <text class="lane-label" x="881" y="592">hub route</text>

  <path class="route" d="M 1185 545 H 1225 V 409 H 1290"/>
  <text class="lane-label" x="1202" y="392">DRG attachment</text>

  <path class="route" d="M 1185 545 H 1225 V 794 H 1290"/>
  <text class="lane-label" x="1202" y="820">DRG attachment</text>

  <path class="admin-route" d="M 678 652 V 680 H 925 V 690 H 1225 V 498 H 1290"/>
  <text class="lane-label" x="911" y="670">admin path to spoke A</text>

  <path class="admin-route" d="M 678 652 V 680 H 925 V 825 H 1225 V 820 H 1290"/>
  <text class="lane-label" x="912" y="849">admin path to spoke B</text>

  <path class="audit-route" d="M 500 521 H 475 V 845 H 1028 V 865"/>
  <path class="audit-route" d="M 1100 620 V 845 H 1095 V 865"/>
  <path class="audit-route" d="M 1600 454 H 1660 V 900 H 1600"/>
  <path class="audit-route" d="M 1600 839 H 1660 V 920 H 1600"/>

  <circle cx="310" cy="485" r="5" fill="#C74634"/>
  <circle cx="855" cy="611" r="5" fill="#334155"/>
  <circle cx="1185" cy="545" r="5" fill="#334155"/>

  <rect x="80" y="640" width="230" height="130" rx="16" fill="#ffffff" stroke="#c7d2df" stroke-width="1.5"/>
  <text class="section-title" x="110" y="680">GUARDRAILS</text>
  <text class="small" x="110" y="710">No world-open CIDRs</text>
  <text class="small" x="110" y="734">Limited SSH/RDP sources</text>
  <text class="small" x="110" y="758">Short session TTL</text>

  <path class="muted" d="M 310 705 H 385 V 700 H 500"/>
</svg>
