---
- name: Run Terraform plan for Secure Desktops Landing Zone
  hosts: localhost
  gather_facts: false
  vars:
    terraform_action: plan
    terraform_backend_enabled: false
    terraform_working_dir: "{{ playbook_dir }}/.."
  roles:
    - terraform_runner
