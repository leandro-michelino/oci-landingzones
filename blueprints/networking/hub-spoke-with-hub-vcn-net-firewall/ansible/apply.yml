---
- name: Apply the Hub-Spoke With OCI Network Firewall blueprint
  hosts: localhost
  gather_facts: false
  vars:
    terraform_working_dir: "{{ playbook_dir }}/.."
    terraform_action: apply
    terraform_backend_enabled: true
  tasks:
    - name: Run shared Terraform runner
      ansible.builtin.import_role:
        name: ../../../../ansible/roles/terraform_runner
