---
- name: Run Terraform apply for Oracle Analytics Cloud
  hosts: localhost
  gather_facts: false
  vars:
    terraform_action: apply
    terraform_backend_enabled: true
    terraform_working_dir: "{{ playbook_dir }}/.."
  roles:
    - terraform_runner
